<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="/assets/alert.css">
    <title>Crud</title>
</head>
<body>

    <div class="header">Crud Product</div>

    <div class="box">
        <button id="btnAdd">Add Product</button>
    </div>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Profile</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div id="modal" class="modal">
        <form id="formAdd">
            <h2>Add Product</h2>

            <div class="form-content">
                <div class="input-group">
                    <label for="name">Name</label>
                    <input autocomplete="off" type="text" name="name" id="name" placeholder="Name">
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input autocomplete="new-email" type="email" name="email" id="email" placeholder="Email">
                </div>
            </div>

            <div class="form-content">
                <div class="input-group">
                    <label for="password">Password</label>
                    <input autocomplete="off" type="password" name="password" id="password" placeholder="Password">
                </div>
                <div class="input-group">
                    <label for="comfirnPassword">Confirm password</label>
                    <input autocomplete="off" type="password" name="confirmPassword" id="confirmPassword" placeholder="Password">
                </div>
            </div>
            <div class="form-content">
                <div class="input-group">
                    <label for="image">Image</label>
                    <input style="font-size: 1.4rem;" id="addImage" name="image" type="file">
                </div>
                <div style="justify-content: center;align-items: center;" class="input-group">
                    <img id="addPreview" src="">
                </div>
            </div>
            <div class="form-content-button">
                <button id="btnCancel" type="button">Cancel</button>
                <button id="btnSave" type="submit">Save</button>
            </div>
        </form>
    </div>

    <div id="editModal" class="modal">
        <form id="formEdit">
            <h2>Edit Product</h2>
            <input type="hidden" id="editId" name="id">

            <div class="form-content">
                <div class="input-group">
                    <label for="nameEdit">Name</label>
                    <input autocomplete="off" type="text" name="nameEdit" id="nameEdit" placeholder="Name">
                </div>
                <div class="input-group">
                    <label for="emailEdit">Email</label>
                    <input autocomplete="new-email" type="email" name="emailEdit" id="emailEdit" placeholder="Email">
                </div>
            </div>

            <div class="form-content">
                <div class="input-group">
                    <label for="passwordEdit">Password</label>
                    <input autocomplete="off" type="password" name="passwordEdit" id="passwordEdit" placeholder="Password">
                </div>
                <div class="input-group">
                    <label for="comfirnPasswordEdit">Confirm password</label>
                    <input autocomplete="off" type="password" name="confirmPasswordEdit" id="confirmPasswordEdit" placeholder="Password">
                </div>
            </div>
            <div class="form-content">
                <div class="input-group">
                    <label for="editImage">Image</label>
                    <input style="font-size: 1.4rem;" id="editImage" name="imageEdit" type="file">
                </div>
                <div style="justify-content: center;align-items: center;" class="input-group">
                    <img id="editPreview" src="">
                </div>
            </div>
            <div class="form-content-button">
                <button id="btnCancelEdit" type="button">Cancel</button>
                <button id="btnSaveEdit" type="submit">Save</button>
            </div>
        </form>
    </div>
    
    <div style="flex-direction: column;gap: 1rem;" id="viewModal" class="modal">
        <div style="background-color: white;padding: 2rem;box-shadow: 0 0 1px rgba(128, 128, 128, 0.529);border-radius: 1rem;display:flex;flex-direction:column;gap:2rem;align-items:center;" class="view-card">
            <h2>View Product</h2>
            <div class="form-content">
                <div class="input-group">
                    <label>Image</label>
                    <img id="viewPreview" src="" style="max-width:200px;border-radius:8px;">
                </div>
            </div>
            <div class="form-content">
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" id="viewName" readonly>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="text" id="viewEmail" readonly>
                </div>
            </div>
            <div class="form-content-button">
                <button id="btnCloseView" type="button">Close</button>
            </div>
        </div>
    </div>
    
    <script src="/assets/script.js"></script>
    <script src="/assets/alert.js"></script>
</body>
</html>
